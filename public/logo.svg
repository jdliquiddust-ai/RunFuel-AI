<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Dark premium background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#181008"/>
      <stop offset="100%" stop-color="#080402"/>
    </linearGradient>

    <!-- Orange ambient glow in center -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#FF5500" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FF2200" stop-opacity="0"/>
    </radialGradient>

    <!-- Arc gradient -->
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>

    <!-- Fuel drop gradient -->
    <linearGradient id="drop-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFD4B8"/>
    </linearGradient>

    <!-- Bottom vignette -->
    <linearGradient id="vig" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Glow for the arc -->
    <filter id="arc-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="18"
                    flood-color="#FF5500" flood-opacity="0.70"/>
    </filter>

    <!-- Glow for dot milestone -->
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="14"
                    flood-color="#FF7700" flood-opacity="1"/>
    </filter>

    <!-- Glow for fuel drop -->
    <filter id="drop-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12"
                    flood-color="#FFFFFF" flood-opacity="0.30"/>
    </filter>

    <clipPath id="clip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#ambient)"/>

    <!--
      ARC — represents the run progress / stopwatch ring
      Center: 512,512  Radius: 330  Stroke: 52
      Circumference: 2π×330 ≈ 2073
      270° arc = 75% = 1555px  Gap = 518px
      Rotated -90° so arc starts at 12 o'clock
      Arc ends at 9 o'clock position (left): (182, 512)
    -->

    <!-- Faint track (full circle) -->
    <circle cx="512" cy="512" r="330"
            fill="none"
            stroke="#FF4F00"
            stroke-width="52"
            stroke-linecap="round"
            opacity="0.10"/>

    <!-- Active arc — 270° (the run in progress) -->
    <circle cx="512" cy="512" r="330"
            fill="none"
            stroke="url(#arc-grad)"
            stroke-width="52"
            stroke-linecap="round"
            stroke-dasharray="1555 518"
            transform="rotate(-90 512 512)"
            filter="url(#arc-glow)"/>

    <!-- Milestone dot at arc endpoint (9 o'clock = left side = 182,512) -->
    <circle cx="182" cy="512" r="32"
            fill="#FF6600"
            filter="url(#dot-glow)"/>
    <circle cx="182" cy="512" r="16"
            fill="white"/>

    <!--
      FUEL DROP — centered inside the ring
      Clean teardrop: tip at top, round at bottom
      Bottom: (512, 660)  Tip: (512, 318)
      Widest: ±108px at y≈580
    -->
    <g filter="url(#drop-glow)">
      <path d="M 512 660
               C 400 636 362 554 394 474
               C 416 420 462 376 512 318
               C 562 376 608 422 630 476
               C 662 556 624 638 512 660 Z"
            fill="url(#drop-grad)"/>

      <!-- Inner highlight on drop -->
      <path d="M 512 598
               C 470 584 452 546 464 506
               C 472 480 490 460 512 430
               C 534 460 550 482 558 508
               C 570 548 554 586 512 598 Z"
            fill="white" opacity="0.45"/>
    </g>

    <!-- Bottom vignette -->
    <rect width="1024" height="1024" fill="url(#vig)"/>
  </g>
</svg>
